<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>知进伴学 后端展示</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --header-height: 56px;
      --history-width: 292px;
      --context-width: 420px;
      --resizer-width: 8px;
    }
    * { box-sizing: border-box; }
    html { height: 100%; overflow: hidden; }
    body { height: 100vh; height: 100dvh; min-height: 0; margin: 0; display: flex; flex-direction: column; overflow: hidden; background: #f6f7f9; color: #15171a; }
    header { flex: 0 0 var(--header-height); height: var(--header-height); min-height: var(--header-height); max-height: var(--header-height); display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 0 18px; overflow: hidden; background: #ffffff; border-bottom: 1px solid #dde1e7; }
    h1 { flex: 0 0 auto; font-size: 18px; margin: 0; white-space: nowrap; }
    main { flex: 1 1 auto; min-height: 0; overflow: hidden; display: grid; }
    aside, section { min-height: 0; overflow: hidden; }
    aside { border-right: 1px solid #dde1e7; background: #ffffff; }
    button.session { width: 100%; border: 0; border-bottom: 1px solid #edf0f3; background: transparent; padding: 14px; text-align: left; cursor: pointer; }
    button.session:hover, button.session.active { background: #eef5ff; }
    .muted { color: #667085; font-size: 12px; }
    .header-actions { min-width: 0; display: flex; align-items: center; justify-content: flex-end; gap: 12px; overflow-x: auto; overflow-y: hidden; white-space: nowrap; scrollbar-width: none; }
    .header-actions::-webkit-scrollbar { display: none; }
    .header-actions a { color: #175cd3; font-size: 13px; text-decoration: none; }
    .header-actions button { min-height: 32px; border: 1px solid #c7d0dc; border-radius: 7px; background: #ffffff; color: #1d2939; padding: 0 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .header-actions button:hover { background: #f2f4f7; }
    .header-actions button.primary { border-color: #175cd3; background: #175cd3; color: #ffffff; }
    .header-actions a.global-panel-link { border: 1px solid #175cd3; border-radius: 6px; background: #175cd3; color: #ffffff; padding: 7px 10px; }
    .header-actions a.global-panel-link:hover { filter: brightness(.98); }
    .account-status { display: inline-flex; align-items: center; gap: 6px; max-width: 260px; border: 1px solid #d0d5dd; border-radius: 999px; padding: 5px 9px; background: #f8fafc; color: #344054; font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
    .account-status strong { overflow: hidden; text-overflow: ellipsis; }
    .viewer { display: grid; gap: 12px; padding: 14px; align-content: start; }
    .summary-card, .pair-row, .panel-launch-card, .process-card, .device-control-card, .coach-card, .capture-card, .memory-card { background: #ffffff; border: 1px solid #dde1e7; border-radius: 8px; }
    .summary-card { padding: 14px; white-space: pre-wrap; line-height: 1.55; }
    .summary-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .summary-head strong { display: block; }
    .summary-action { border: 1px solid #b9c4d0; border-radius: 6px; background: #ffffff; color: #1d2939; padding: 7px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .summary-action:hover { background: #f2f4f7; }
    .summary-action:disabled { cursor: wait; color: #98a2b3; }
    .visualization-actions { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; margin: 8px 0; }
    .visualization-button { min-height: 30px; border: 1px solid #0e9384; border-radius: 7px; background: #f0fdfa; color: #0f766e; padding: 0 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .visualization-button:hover { background: #ccfbf1; }
    .visualization-button:disabled { cursor: wait; border-color: #d0d5dd; background: #f2f4f7; color: #98a2b3; }
    .visualization-status { flex: 1 1 240px; min-width: 180px; color: #667085; font-size: 12px; line-height: 1.35; }
    .pairs { display: grid; gap: 12px; }
    .pair-row { display: grid; grid-template-columns: minmax(300px, 38%) minmax(0, 1fr); min-height: 152px; overflow: hidden; }
    .thumbs { display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; padding: 12px; border-right: 1px solid #edf0f3; background: #fbfcfe; }
    .thumb { width: min(100%, 172px); flex: 1 1 150px; border: 1px solid #dde1e7; border-radius: 6px; overflow: hidden; background: #ffffff; }
    .thumb img { width: 100%; display: block; cursor: zoom-in; background: #edf0f3; aspect-ratio: 16 / 9; object-fit: contain; }
    .thumb .cap { padding: 5px 6px; font-size: 11px; color: #475467; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .thumb.image-error { min-height: 88px; display: flex; align-items: center; justify-content: center; color: #667085; font-size: 11px; text-align: center; }
    .thumb.image-error img, .thumb.image-error .cap { display: none; }
    .thumb.image-error::before { content: "图片加载失败"; padding: 8px; }
    .analysis-card { padding: 14px; white-space: pre-wrap; line-height: 1.55; min-width: 0; overflow-wrap: anywhere; }
    .analysis-title { display: block; margin-bottom: 8px; }
    .analysis-body { white-space: pre-wrap; }
    .panel-launch-card, .process-card, .device-control-card, .coach-card, .capture-card, .memory-card { padding: 14px; }
    .control-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .control-head strong { display: block; }
    .control-status { display: inline-flex; align-items: center; gap: 6px; min-height: 24px; border: 1px solid #d0d5dd; border-radius: 999px; padding: 2px 9px; font-size: 12px; color: #344054; background: #f8fafc; white-space: nowrap; }
    .control-status.online { border-color: #abefc6; color: #067647; background: #ecfdf3; }
    .control-status.offline { border-color: #fedf89; color: #b54708; background: #fffaeb; }
    .control-grid { display: grid; gap: 8px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .control-button { min-height: 50px; border: 1px solid #b9c4d0; border-radius: 8px; background: #ffffff; color: #1d2939; padding: 9px; cursor: pointer; text-align: left; display: grid; gap: 3px; align-content: center; }
    .control-button:hover { background: #f2f4f7; }
    .control-button.primary { border-color: #175cd3; background: #f5f8ff; color: #175cd3; }
    .control-button.danger { border-color: #fda29b; color: #b42318; }
    .control-button:disabled { cursor: wait; color: #98a2b3; background: #f8fafc; border-color: #d0d5dd; }
    .control-button strong { font-size: 13px; }
    .control-button.wide { grid-column: 1 / -1; }
    .control-goal { display: grid; gap: 8px; grid-template-columns: minmax(0, 1fr) auto; margin-top: 10px; }
    .control-goal textarea { min-height: 40px; border: 1px solid #b9c4d0; border-radius: 6px; padding: 8px 10px; font: inherit; font-size: 13px; resize: vertical; line-height: 1.4; }
    .control-goal button { border: 1px solid #175cd3; border-radius: 6px; background: #175cd3; color: #ffffff; padding: 0 12px; cursor: pointer; }
    .command-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .command-pill { border: 1px solid #d0d5dd; border-radius: 999px; padding: 3px 8px; color: #475467; background: #f8fafc; font-size: 12px; }
    .command-pill.applied { border-color: #abefc6; color: #067647; background: #ecfdf3; }
    .command-pill.failed, .command-pill.expired { border-color: #fda29b; color: #b42318; background: #fff4f2; }
    .command-pill.delivered, .command-pill.pending { border-color: #fedf89; color: #b54708; background: #fffaeb; }
    .panel-actions { display: grid; gap: 10px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .panel-button { min-height: 72px; border: 1px solid #c7d7fe; border-radius: 8px; background: #f8fbff; color: #1d2939; padding: 12px; cursor: pointer; text-align: left; display: grid; gap: 6px; align-content: start; }
    .panel-button:hover { background: #eef5ff; border-color: #84caff; }
    .panel-button strong { font-size: 14px; }
    .strategy-grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .strategy-field { border-top: 1px solid #edf0f3; padding-top: 8px; line-height: 1.45; }
    .strategy-field:first-child { border-top: 0; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .chip { border: 1px solid #c6d7ef; background: #f2f7ff; color: #175cd3; border-radius: 999px; padding: 3px 8px; font-size: 12px; }
    .chip.good { border-color: #abefc6; background: #ecfdf3; color: #067647; }
    .chip.warn { border-color: #fedf89; background: #fffaeb; color: #b54708; }
    .coach-card { display: grid; gap: 12px; }
    .coach-grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .coach-field { display: grid; gap: 5px; min-width: 0; }
    .coach-field label { color: #344054; font-size: 12px; font-weight: 600; }
    .coach-field select, .coach-field textarea { width: 100%; border: 1px solid #b9c4d0; border-radius: 7px; background: #ffffff; color: #15171a; font: inherit; font-size: 13px; line-height: 1.4; }
    .coach-field select { height: 36px; padding: 0 9px; }
    .coach-field textarea { min-height: 58px; max-height: 132px; resize: vertical; padding: 8px 9px; grid-column: 1 / -1; }
    .coach-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .coach-actions button { min-height: 34px; border: 1px solid #175cd3; border-radius: 7px; background: #175cd3; color: #ffffff; padding: 0 11px; cursor: pointer; font-size: 12px; }
    .coach-actions button.secondary { border-color: #b9c4d0; background: #ffffff; color: #1d2939; }
    .coach-actions button:disabled { cursor: wait; border-color: #d0d5dd; background: #f2f4f7; color: #98a2b3; }
    .context-toggles { display: grid; gap: 7px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .context-toggle { min-height: 30px; display: flex; align-items: center; gap: 7px; color: #344054; font-size: 12px; }
    .context-toggle input { width: 15px; height: 15px; accent-color: #175cd3; }
    .capture-grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(94px, 1fr)); }
    .capture-tile { min-width: 0; border: 1px solid #dde1e7; border-radius: 7px; overflow: hidden; background: #fbfcfe; color: #475467; cursor: zoom-in; text-align: left; padding: 0; }
    .capture-tile:hover { border-color: #84caff; background: #f5faff; }
    .capture-tile img { width: 100%; display: block; aspect-ratio: 4 / 3; object-fit: contain; background: #eef2f6; }
    .capture-tile span { display: block; padding: 5px 6px; font-size: 11px; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .capture-tile.rejected { opacity: .68; }
    .capture-tile.duplicate span::after { content: " · 重复"; color: #b42318; }
    .capture-tile.image-error { min-height: 88px; display: grid; place-items: center; padding: 8px; color: #667085; font-size: 11px; line-height: 1.35; text-align: center; cursor: default; }
    .capture-tile.image-error img, .capture-tile.image-error span { display: none; }
    .capture-tile.image-error::before { content: "缩略图不可用"; }
    .capture-empty { border: 1px dashed #c7d0dc; border-radius: 7px; padding: 14px; color: #667085; font-size: 12px; line-height: 1.45; background: #fbfcfe; }
    .message-captures { display: flex; flex-wrap: wrap; gap: 7px; }
    .message-capture { width: 112px; border: 1px solid #d0d5dd; border-radius: 7px; overflow: hidden; background: #ffffff; cursor: zoom-in; padding: 0; color: #475467; }
    .message-capture img { width: 100%; aspect-ratio: 4 / 3; object-fit: contain; display: block; background: #eef2f6; }
    .message-capture span { display: block; padding: 4px 6px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .message-capture.image-error { height: 78px; display: grid; place-items: center; padding: 8px; color: #667085; font-size: 11px; line-height: 1.35; text-align: center; cursor: default; }
    .message-capture.image-error img, .message-capture.image-error span { display: none; }
    .message-capture.image-error::before { content: "缩略图不可用"; }
    .memory-list { display: grid; gap: 8px; }
    .memory-row { display: grid; gap: 4px; border-top: 1px solid #edf0f3; padding-top: 8px; line-height: 1.45; }
    .memory-row:first-child { border-top: 0; padding-top: 0; }
    .learning-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .learning-head strong { display: block; }
    .learning-grid { display: grid; gap: 8px; }
    .learning-item { border-top: 1px solid #edf0f3; padding-top: 8px; line-height: 1.45; }
    .learning-item:first-child { border-top: 0; padding-top: 0; }
    .learning-type { display: inline-block; min-width: 44px; color: #175cd3; font-size: 12px; font-weight: 600; }
    .mistake-type { color: #b42318; }
    .process-type { color: #027a48; }
    .qa-thread { display: grid; gap: 12px; }
    .qa-followup-form { display: grid; gap: 8px; grid-template-columns: minmax(0, 1fr) auto; align-items: end; padding: 10px; border: 1px solid #d6e4ff; border-radius: 8px; background: #f8fbff; }
    .qa-followup-form label { display: grid; gap: 5px; min-width: 0; color: #344054; font-size: 12px; font-weight: 600; }
    .qa-followup-input { width: 100%; min-height: 38px; border: 1px solid #b9c4d0; border-radius: 6px; background: #ffffff; padding: 8px 10px; font: inherit; font-size: 13px; resize: vertical; line-height: 1.4; }
    .qa-followup-button { min-height: 38px; border: 1px solid #175cd3; border-radius: 6px; background: #175cd3; color: #ffffff; padding: 0 12px; cursor: pointer; white-space: nowrap; }
    .qa-followup-button:disabled { border-color: #b9c4d0; background: #eef2f6; color: #98a2b3; cursor: wait; }
    .qa-turn { border-top: 1px solid #edf0f3; padding-top: 12px; }
    .qa-turn:first-child { border-top: 0; padding-top: 0; }
    .qa-question-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .qa-question { display: grid; gap: 4px; min-width: 0; }
    .qa-question strong { font-size: 14px; line-height: 1.35; }
    .qa-image-link { color: #175cd3; text-decoration: none; white-space: nowrap; font-size: 12px; }
    .qa-answer-layout { display: grid; gap: 10px; grid-template-columns: minmax(132px, 220px) minmax(0, 1fr); align-items: start; }
    .qa-frame-preview { display: block; border: 1px solid #d0d5dd; border-radius: 8px; overflow: hidden; background: #f8fafc; text-decoration: none; color: #475467; }
    .qa-frame-preview img { display: block; width: 100%; aspect-ratio: 4 / 3; object-fit: contain; background: #eef2f6; }
    .qa-frame-preview span { display: block; padding: 6px 8px; font-size: 12px; }
    .qa-rich-answer { display: grid; gap: 8px; }
    .qa-card-section { border: 1px solid #e4e7ec; border-left-width: 4px; border-radius: 8px; background: #ffffff; padding: 10px 12px; line-height: 1.55; }
    .qa-card-section h4 { margin: 0 0 6px; font-size: 13px; color: #344054; }
    .qa-card-section p { margin: 0; }
    .qa-card-section ol { margin: 0; padding-left: 20px; display: grid; gap: 4px; }
    .qa-card-section li { padding-left: 2px; }
    .qa-topic { border-left-color: #175cd3; background: #f8fbff; }
    .qa-facts, .qa-idea { border-left-color: #0e9384; background: #f6fefc; }
    .qa-student { border-left-color: #7a5af8; background: #f7f5ff; }
    .qa-check, .qa-warning { border-left-color: #d92d20; background: #fff7f6; }
    .qa-steps { border-left-color: #f79009; background: #fffcf5; }
    .qa-fix, .qa-result { border-left-color: #12b76a; background: #f6fef9; }
    .qa-follow { border-left-color: #2e90fa; background: #f5faff; }
    .qa-math { display: inline-block; padding: 1px 5px; border-radius: 5px; background: rgba(23, 92, 211, .08); color: #175cd3; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    .qa-plain-text { white-space: pre-wrap; line-height: 1.55; }
    .thumb.duplicate { opacity: .62; }
    .thumb.duplicate .cap::after { content: " · 重复"; color: #b42318; }
    .load-more { border: 1px solid #b9c4d0; border-radius: 6px; background: #ffffff; color: #1d2939; padding: 10px 12px; cursor: pointer; font-size: 13px; }
    .load-more:hover { background: #f2f4f7; }
    .load-more:disabled { cursor: wait; color: #98a2b3; }
    .empty-pair { padding: 12px; color: #667085; font-size: 12px; }
    .logs { border-left: 1px solid #dde1e7; background: #101828; color: #d0d5dd; padding: 12px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; }
    .log { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .workspace { flex: 1 1 auto; min-height: 0; height: auto; overflow: hidden; display: grid; grid-template-columns: var(--history-width) var(--resizer-width) minmax(460px, 1fr) var(--resizer-width) var(--context-width); background: #f3f5f8; }
    .pane-resizer { position: relative; z-index: 4; min-width: var(--resizer-width); cursor: col-resize; background: #eef1f5; touch-action: none; }
    .pane-resizer::before { content: ""; position: absolute; inset: 0 3px; border-left: 1px solid transparent; border-right: 1px solid transparent; transition: border-color .15s ease, background .15s ease; }
    .pane-resizer:hover::before, .pane-resizer.active::before { border-color: #84caff; background: #d1e9ff; }
    body.resizing-panes { cursor: col-resize; user-select: none; }
    .history-pane { display: grid; grid-template-rows: auto minmax(0, 1fr); min-width: 0; border-right: 1px solid #dde1e7; background: #ffffff; overflow: hidden; }
    .history-head { padding: 14px; border-bottom: 1px solid #edf0f3; }
    .history-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .history-title strong { font-size: 14px; }
    .history-list { overflow: auto; }
    .chat-pane { min-width: 0; overflow: hidden; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; background: #f7f8fb; }
    .chat-hero { padding: 14px 18px; border-bottom: 1px solid #dde1e7; background: rgba(255,255,255,.94); backdrop-filter: blur(12px); }
    .chat-hero-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .chat-hero h2 { margin: 0 0 6px; font-size: 18px; line-height: 1.3; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .hero-pill { display: inline-flex; align-items: center; min-height: 24px; border: 1px solid #d0d5dd; border-radius: 999px; background: #ffffff; padding: 2px 9px; color: #344054; font-size: 12px; }
    .chat-thread { min-height: 0; overflow: auto; padding: 18px max(18px, calc((100% - 860px) / 2)); display: grid; align-content: start; gap: 14px; }
    .chat-message { display: grid; gap: 7px; max-width: min(780px, 92%); }
    .chat-message.user { justify-self: end; }
    .chat-message.assistant { justify-self: start; }
    .message-meta { display: flex; align-items: center; gap: 8px; color: #667085; font-size: 12px; }
    .chat-message.user .message-meta { justify-content: flex-end; }
    .chat-bubble { border: 1px solid #dce3ec; border-radius: 8px; padding: 12px 13px; background: #ffffff; line-height: 1.58; overflow-wrap: anywhere; box-shadow: 0 1px 2px rgba(16,24,40,.04); }
    .chat-message.user .chat-bubble { border-color: #175cd3; background: #175cd3; color: #ffffff; }
    .message-actions { display: flex; flex-wrap: wrap; gap: 7px; }
    .message-actions button, .composer-tools button, .context-tabs button { min-height: 32px; border: 1px solid #c7d0dc; border-radius: 7px; background: #ffffff; color: #1d2939; padding: 0 10px; cursor: pointer; font-size: 12px; }
    .message-actions button:hover, .composer-tools button:hover, .context-tabs button:hover { background: #f2f4f7; }
    .message-actions button.primary, .composer-tools button.primary { border-color: #175cd3; background: #f5f8ff; color: #175cd3; }
    .chat-composer { display: grid; gap: 10px; padding: 12px 16px 16px; border-top: 1px solid #dde1e7; background: #ffffff; }
    .composer-tools { display: flex; flex-wrap: wrap; gap: 8px; }
    .composer-status { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; color: #667085; font-size: 12px; }
    .composer-input { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: end; }
    .composer-input textarea { min-height: 46px; max-height: 140px; border: 1px solid #b9c4d0; border-radius: 8px; padding: 10px 12px; font: inherit; line-height: 1.45; resize: vertical; }
    .composer-input button { min-height: 46px; border: 1px solid #175cd3; border-radius: 8px; background: #175cd3; color: #ffffff; padding: 0 16px; cursor: pointer; }
    .composer-input button:disabled, .composer-tools button:disabled { cursor: wait; border-color: #d0d5dd; background: #f2f4f7; color: #98a2b3; }
    .context-pane { min-width: 0; overflow: hidden; display: grid; grid-template-rows: auto minmax(0, 1fr); border-left: 1px solid #dde1e7; background: #ffffff; }
    .context-tabs { display: flex; gap: 6px; padding: 10px; border-bottom: 1px solid #edf0f3; overflow-x: auto; }
    .context-tabs button.active { border-color: #175cd3; background: #eef5ff; color: #175cd3; }
    .context-stack { min-height: 0; overflow: auto; padding: 12px; }
    .context-view { display: grid; gap: 12px; }
    .context-view[hidden] { display: none !important; }
    .context-card { background: #ffffff; border: 1px solid #dde1e7; border-radius: 8px; padding: 14px; }
    .inline-frame-shell { min-height: 0; height: calc(100vh - var(--header-height) - 82px); height: calc(100dvh - var(--header-height) - 82px); display: grid; grid-template-rows: auto minmax(0, 1fr); padding: 0; overflow: hidden; }
    .inline-frame-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #edf0f3; }
    .inline-frame-head a { color: #175cd3; font-size: 12px; text-decoration: none; }
    .inline-frame { width: 100%; min-height: 0; height: 100%; border: 0; background: #ffffff; }
    .context-pane .logs { border-left: 0; border-radius: 8px; min-height: 360px; max-height: none; }
    .materials-note { padding: 10px 12px; border: 1px solid #dde1e7; border-radius: 8px; background: #f8fafc; color: #475467; font-size: 12px; line-height: 1.5; }
    .context-pane .summary-card, .context-pane .panel-launch-card, .context-pane .process-card, .context-pane .device-control-card, .context-pane .coach-card, .context-pane .capture-card, .context-pane .memory-card { border-radius: 8px; }
    .auth-dialog { width: min(560px, calc(100vw - 32px)); border: 1px solid #d0d5dd; border-radius: 8px; padding: 0; background: #ffffff; color: #15171a; box-shadow: 0 24px 80px rgba(16,24,40,.22); }
    .auth-dialog::backdrop { background: rgba(15,23,42,.36); }
    .auth-shell { display: grid; gap: 14px; padding: 18px; }
    .auth-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .auth-head h3 { margin: 0 0 4px; font-size: 18px; }
    .auth-head button { border: 0; background: transparent; color: #667085; cursor: pointer; font-size: 18px; line-height: 1; }
    .auth-tabs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; padding: 3px; border: 1px solid #d0d5dd; border-radius: 8px; background: #f8fafc; }
    .auth-tabs button { min-height: 34px; border: 0; border-radius: 6px; background: transparent; color: #344054; cursor: pointer; font-size: 13px; }
    .auth-tabs button.active { background: #ffffff; color: #175cd3; box-shadow: 0 1px 2px rgba(16,24,40,.08); }
    .auth-form, .model-form { display: grid; gap: 10px; }
    .auth-form[hidden], .model-form[hidden] { display: none !important; }
    .auth-grid, .model-grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .auth-field, .model-field { display: grid; gap: 5px; min-width: 0; color: #344054; font-size: 12px; font-weight: 600; }
    .auth-field.wide, .model-field.wide { grid-column: 1 / -1; }
    .auth-field input, .model-field input, .model-field select { width: 100%; height: 38px; border: 1px solid #b9c4d0; border-radius: 7px; padding: 0 10px; font: inherit; font-size: 13px; background: #ffffff; color: #15171a; }
    .auth-actions, .model-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .auth-actions button, .model-actions button { min-height: 36px; border: 1px solid #175cd3; border-radius: 7px; background: #175cd3; color: #ffffff; padding: 0 12px; cursor: pointer; }
    .auth-actions button.secondary, .model-actions button.secondary { border-color: #b9c4d0; background: #ffffff; color: #1d2939; }
    .auth-error { min-height: 18px; color: #b42318; font-size: 12px; }
    .profile-list, .model-list, .ops-grid { display: grid; gap: 8px; }
    .profile-list { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
    .profile-pill, .model-row, .ops-row { border: 1px solid #dde1e7; border-radius: 8px; background: #fbfcfe; padding: 9px; line-height: 1.4; }
    .profile-pill strong, .model-row strong, .ops-row strong { display: block; font-size: 13px; }
    .ops-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    dialog { width: min(96vw, 1280px); max-height: 92vh; border: 0; padding: 0; background: #000; }
    dialog img { width: 100%; max-height: 92vh; display: block; object-fit: contain; }
    @media (max-width: 1180px) {
      .workspace { grid-template-columns: 260px minmax(0, 1fr); }
      .pane-resizer { display: none; }
      .context-pane { display: none; }
    }
    @media (max-width: 920px) {
      header { align-items: center; padding: 0 14px; flex-direction: row; }
      .header-actions { flex-wrap: nowrap; justify-content: flex-start; }
      .workspace { height: auto; min-height: 0; grid-template-columns: 1fr; grid-template-rows: 156px minmax(0, 1fr); }
      .history-pane { display: grid; grid-template-rows: minmax(0, 1fr); max-height: none; border-right: 0; border-bottom: 1px solid #dde1e7; }
      .history-head { display: none; }
      .history-list { display: flex; overflow-x: auto; overflow-y: hidden; }
      button.session { min-width: 236px; border-bottom: 0; border-right: 1px solid #edf0f3; }
      .chat-pane { min-height: 0; }
      .chat-thread { padding: 14px 12px; }
      .chat-message { max-width: 100%; }
      .composer-input { grid-template-columns: 1fr; }
      .panel-actions, .control-grid, .coach-grid, .context-toggles { grid-template-columns: 1fr; }
      .control-goal { grid-template-columns: 1fr; }
    }
    @media (max-width: 840px) { .pair-row { grid-template-columns: 1fr; } .thumbs { border-right: 0; border-bottom: 1px solid #edf0f3; } }
    @media (max-width: 700px) { .qa-followup-form, .qa-answer-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>知进伴学 学习工作台</h1>
    <div class="header-actions">
      <span class="account-status" id="accountStatus"><strong>访客模式</strong></span>
      <button class="primary" type="button" id="accountButton">账号</button>
      <button type="button" id="modelButton">模型</button>
      <a class="global-panel-link" href="/session-panel" data-open-url="/session-panel" data-open-title="全局学习中心" data-open-meta="全局学习清单、错题、复习队列和长期画像">全局学习中心</a>
      <a href="/assets" data-open-assets="learning">学习资产</a>
      <a href="/prompts" data-open-url="/prompts" data-open-title="提示词配置" data-open-meta="在右侧调整提示词，不离开当前对话">提示词配置</a>
      <span class="muted">xue.evowit.com</span>
    </div>
  </header>
  <main class="workspace">
    <aside class="history-pane">
      <div class="history-head">
        <div class="history-title">
          <strong>对话历史</strong>
          <button class="summary-action" type="button" id="newSession">新对话</button>
        </div>
        <div class="muted">选择一个回合后，聊天、画面和学习资产会在同一工作台联动。</div>
      </div>
      <div class="history-list" id="sessions"></div>
    </aside>

    <div class="pane-resizer" data-resizer="history" role="separator" aria-orientation="vertical" aria-label="调整左侧历史宽度"></div>

    <section class="chat-pane">
      <div class="chat-hero">
        <div class="chat-hero-row">
          <div>
            <h2 id="chatTitle">学习对话</h2>
            <div class="muted" id="chatSubtitle">正在载入最近回合...</div>
            <div class="hero-meta" id="chatMeta"></div>
          </div>
          <button class="summary-action" type="button" id="openLiveContext">查看材料</button>
        </div>
      </div>
      <section class="chat-thread" id="chatThread"></section>
      <form class="chat-composer" id="chatComposer">
        <div class="composer-status" id="composerStatus"></div>
        <div class="composer-tools">
          <button class="primary" type="button" data-command="voice_question">语音提问</button>
          <button type="button" data-command="single_capture">拍题解析</button>
          <button type="button" data-command="start_burst">智能观察</button>
          <button type="button" data-command="stop_burst">停止观察</button>
          <button type="button" data-open-panel="learning">学习清单</button>
          <button type="button" data-open-panel="mistakes">错题本</button>
          <button type="button" data-open-panel="review">复习队列</button>
          <button type="button" data-open-panel="profile">长期画像</button>
        </div>
        <div class="composer-input">
          <textarea id="chatInput" name="question" rows="1" placeholder="直接追问当前回合，例如：第二题为什么这样算？帮我整理这轮错题。"></textarea>
          <button id="chatSend" type="submit">发送</button>
        </div>
      </form>
    </section>

    <div class="pane-resizer" data-resizer="context" role="separator" aria-orientation="vertical" aria-label="调整右侧上下文宽度"></div>

    <aside class="context-pane">
      <div class="context-tabs" id="contextTabs">
        <button class="active" type="button" data-context="live">概要</button>
        <button type="button" data-context="materials">材料</button>
        <button type="button" data-context="coach">教练</button>
        <button type="button" data-context="panel">内嵌页面</button>
        <button type="button" data-context="logs">日志</button>
      </div>
      <div class="context-stack">
        <section class="context-view" data-context-view="live">
          <article class="device-control-card" id="deviceControl"></article>
          <article class="capture-card" id="captureStrip"></article>
          <article class="summary-card" id="summary"></article>
          <article class="panel-launch-card" id="panelLaunch"></article>
        </section>
        <section class="context-view" data-context-view="materials" hidden>
          <div class="materials-note">这里集中放详细问答、过程记录和画面解析。默认不展开，避免打断中间对话。</div>
          <article class="process-card" id="qaEvents"></article>
          <article class="process-card" id="process"></article>
          <div class="pairs" id="pairs"></div>
        </section>
        <section class="context-view" data-context-view="coach" hidden>
          <article class="coach-card" id="coachPanel"></article>
          <article class="memory-card" id="memoryPanel"></article>
        </section>
        <section class="context-view" data-context-view="panel" hidden>
          <article class="context-card inline-frame-shell">
            <div class="inline-frame-head">
              <div>
                <strong id="inlineFrameTitle">内嵌页面</strong>
                <div class="muted" id="inlineFrameMeta">从聊天消息或右侧按钮打开学习资产、错题本、提示词等页面。</div>
              </div>
              <a id="inlineFrameExternal" href="/session-panel" target="_blank" rel="noopener">新窗口</a>
            </div>
            <iframe class="inline-frame" id="inlineFrame" title="内嵌学习页面" src="about:blank"></iframe>
          </article>
        </section>
        <section class="context-view" data-context-view="logs" hidden>
          <section class="logs" id="logs"></section>
        </section>
      </div>
    </aside>
  </main>
  <dialog id="zoom" onclick="this.close()"><img id="zoomImg" alt=""></dialog>
  <dialog class="auth-dialog" id="accountDialog">
    <div class="auth-shell">
      <div class="auth-head">
        <div>
          <h3>账号与模型</h3>
          <div class="muted" id="accountDialogMeta">登录后会按账号隔离历史、知识库和模型配置。</div>
        </div>
        <button type="button" id="closeAccountDialog" aria-label="关闭">×</button>
      </div>
      <div class="auth-tabs">
        <button class="active" type="button" data-auth-tab="login">登录</button>
        <button type="button" data-auth-tab="register">注册</button>
      </div>
      <form class="auth-form" id="loginForm">
        <div class="auth-grid">
          <label class="auth-field wide">邮箱<input name="email" type="email" autocomplete="email" required></label>
          <label class="auth-field wide">密码<input name="password" type="password" autocomplete="current-password" required></label>
        </div>
        <div class="auth-actions">
          <button type="submit">登录</button>
          <button class="secondary" type="button" id="logoutButton">退出登录</button>
          <span class="auth-error" id="loginError"></span>
        </div>
      </form>
      <form class="auth-form" id="registerForm" hidden>
        <div class="auth-grid">
          <label class="auth-field">邮箱<input name="email" type="email" autocomplete="email" required></label>
          <label class="auth-field">密码<input name="password" type="password" autocomplete="new-password" minlength="8" required></label>
          <label class="auth-field">姓名<input name="display_name" autocomplete="name"></label>
          <label class="auth-field">学生姓名<input name="student_name"></label>
          <label class="auth-field wide">账号名称<input name="account_name"></label>
        </div>
        <div class="auth-actions">
          <button type="submit">注册并登录</button>
          <span class="auth-error" id="registerError"></span>
        </div>
      </form>
      <section class="process-card">
        <div class="learning-head">
          <strong>身份</strong>
          <span class="muted" id="profileCount">未登录</span>
        </div>
        <div class="profile-list" id="profileList"></div>
      </section>
      <section class="process-card">
        <div class="learning-head">
          <strong>模型配置</strong>
          <span class="muted" id="activeModelStatus">默认模型</span>
        </div>
        <div class="model-list" id="modelList"></div>
        <form class="model-form" id="modelForm">
          <div class="model-grid">
            <label class="model-field">平台
              <select name="provider">
                <option value="evowit">EvoWit / 内部</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="gemini">Gemini</option>
                <option value="zhipu">智谱</option>
                <option value="openai-compatible">OpenAI-compatible</option>
              </select>
            </label>
            <label class="model-field">名称<input name="name" placeholder="我的模型网关"></label>
            <label class="model-field wide">Base URL<input name="base_url" placeholder="https://api.openai.com/v1"></label>
            <label class="model-field">模型名<input name="model" placeholder="gpt-4.1-mini"></label>
            <label class="model-field">API Key<input name="api_key" type="password" autocomplete="off" placeholder="保存后会加密"></label>
            <label class="model-field">最大并发<input name="max_concurrency" type="number" min="1" max="64" value="1"></label>
          </div>
          <div class="model-actions">
            <button type="submit">保存为默认模型</button>
            <span class="auth-error" id="modelError"></span>
          </div>
        </form>
      </section>
      <section class="process-card">
        <div class="learning-head">
          <strong>数据平台</strong>
          <span class="muted" id="opsStatus">未加载</span>
        </div>
        <div class="ops-grid" id="opsGrid"></div>
      </section>
    </div>
  </dialog>
  <script>
    let current = new URLSearchParams(location.search).get("session_id");
    let lastLog = 0;
    let sessionData = null;
    let sessionLoading = false;
    let qaSubmitting = false;
    let deviceControlData = null;
    let controlSubmitting = false;
    let shouldAutoSelectSession = !current;
    let authState = { authenticated: false, auth: {}, profiles: [], active_model_config: null };
    let modelPlatforms = [];
    let latestObservability = null;
    const authTokenStorageKey = "xue.authToken";
    const controlTokenStorageKey = "xue.controlToken";
    const analysisPageSize = 20;
    const sessionsEl = document.querySelector("#sessions");
    const chatTitleEl = document.querySelector("#chatTitle");
    const chatSubtitleEl = document.querySelector("#chatSubtitle");
    const chatMetaEl = document.querySelector("#chatMeta");
    const chatThreadEl = document.querySelector("#chatThread");
    const chatComposerEl = document.querySelector("#chatComposer");
    const composerStatusEl = document.querySelector("#composerStatus");
    const chatInputEl = document.querySelector("#chatInput");
    const chatSendEl = document.querySelector("#chatSend");
    const newSessionButton = document.querySelector("#newSession");
    const openLiveContextButton = document.querySelector("#openLiveContext");
    const contextTabsEl = document.querySelector("#contextTabs");
    const contextStackEl = document.querySelector(".context-stack");
    const inlineFrameEl = document.querySelector("#inlineFrame");
    const inlineFrameTitleEl = document.querySelector("#inlineFrameTitle");
    const inlineFrameMetaEl = document.querySelector("#inlineFrameMeta");
    const inlineFrameExternalEl = document.querySelector("#inlineFrameExternal");
    const deviceControlEl = document.querySelector("#deviceControl");
    const captureStripEl = document.querySelector("#captureStrip");
    const summaryEl = document.querySelector("#summary");
    const panelLaunchEl = document.querySelector("#panelLaunch");
    const coachPanelEl = document.querySelector("#coachPanel");
    const memoryPanelEl = document.querySelector("#memoryPanel");
    const qaEventsEl = document.querySelector("#qaEvents");
    const processEl = document.querySelector("#process");
    const pairsEl = document.querySelector("#pairs");
    const logsEl = document.querySelector("#logs");
    const accountStatusEl = document.querySelector("#accountStatus");
    const accountButtonEl = document.querySelector("#accountButton");
    const modelButtonEl = document.querySelector("#modelButton");
    const accountDialogEl = document.querySelector("#accountDialog");
    const closeAccountDialogEl = document.querySelector("#closeAccountDialog");
    const loginFormEl = document.querySelector("#loginForm");
    const registerFormEl = document.querySelector("#registerForm");
    const loginErrorEl = document.querySelector("#loginError");
    const registerErrorEl = document.querySelector("#registerError");
    const modelErrorEl = document.querySelector("#modelError");
    const logoutButtonEl = document.querySelector("#logoutButton");
    const profileCountEl = document.querySelector("#profileCount");
    const profileListEl = document.querySelector("#profileList");
    const activeModelStatusEl = document.querySelector("#activeModelStatus");
    const modelListEl = document.querySelector("#modelList");
    const modelFormEl = document.querySelector("#modelForm");
    const opsStatusEl = document.querySelector("#opsStatus");
    const opsGridEl = document.querySelector("#opsGrid");
    const workspaceEl = document.querySelector(".workspace");
    const paneLayoutStorageKey = "xue.dashboardPaneLayout";
    const defaultPaneLayout = { history: 292, context: 420 };
    const coachPreferenceStorageKey = "xue.dashboardCoachPreferences";
    const contextInclusionStorageKey = "xue.dashboardContextInclusion";
    const learningModes = [
      ["single_problem", "拍题", "识别题目、学生答案和卡点"],
      ["homework", "写作业", "关注书写过程、停顿和订正"],
      ["answer_check", "检查", "先核对答案和过程，再给订正方向"],
      ["review", "复习", "围绕错题、知识点和相似题安排复习"]
    ];
    const coachDepths = [
      ["hint_first", "先提示", "先给可尝试的一小步"],
      ["step_by_step", "分步讲", "一步步讲清推理过程"],
      ["check_only", "只检查", "只判断对错和下一步订正"],
      ["full_explain", "完整讲", "给完整解析、结论和巩固动作"]
    ];
    const defaultCoachPreference = { learningMode: "single_problem", coachDepth: "hint_first", studentGoal: "" };
    const defaultContextInclusion = {
      visual: true,
      observation: true,
      history: true,
      mistakes: true,
      knowledge: true,
      memory: true,
      strategy: true,
      debug: false
    };
    const contextLabels = {
      visual: "画面",
      observation: "观察",
      history: "历史",
      mistakes: "错题",
      knowledge: "知识点",
      memory: "记忆",
      strategy: "策略",
      debug: "调试"
    };
    let coachPreference = loadCoachPreference();
    let contextInclusion = loadContextInclusion();
    let coachSubmitting = false;
    let latestMemoryData = null;
    let paneLayout = { ...defaultPaneLayout };

    function authToken() {
      return localStorage.getItem(authTokenStorageKey) || "";
    }

    function setAuthToken(token) {
      if (token) localStorage.setItem(authTokenStorageKey, token);
      else localStorage.removeItem(authTokenStorageKey);
    }

    function installAuthenticatedFetch() {
      const originalFetch = window.fetch.bind(window);
      window.fetch = (input, init = {}) => {
        const url = typeof input === "string" ? input : input?.url || "";
        const target = new URL(url, location.href);
        const headers = new Headers(init.headers || (typeof input !== "string" ? input.headers : undefined) || {});
        const token = authToken();
        if (token && target.origin === location.origin && !headers.has("Authorization")) {
          headers.set("Authorization", `Bearer ${token}`);
        }
        const nextInit = { ...init, headers, credentials: init.credentials || "same-origin" };
        if (typeof input !== "string" && input instanceof Request) {
          return originalFetch(new Request(input, nextInit));
        }
        return originalFetch(input, nextInit);
      };
    }

    installAuthenticatedFetch();

    function optionByValue(options, value) {
      return options.find(option => option[0] === value) || options[0];
    }

    function loadCoachPreference() {
      try {
        const saved = JSON.parse(localStorage.getItem(coachPreferenceStorageKey) || "null");
        if (saved && typeof saved === "object") {
          return {
            ...defaultCoachPreference,
            learningMode: optionByValue(learningModes, saved.learningMode || saved.learning_mode)?.[0] || defaultCoachPreference.learningMode,
            coachDepth: optionByValue(coachDepths, saved.coachDepth || saved.coach_depth)?.[0] || defaultCoachPreference.coachDepth,
            studentGoal: String(saved.studentGoal || saved.student_goal || "")
          };
        }
      } catch {}
      return { ...defaultCoachPreference };
    }

    function saveCoachPreference() {
      localStorage.setItem(coachPreferenceStorageKey, JSON.stringify(coachPreference));
    }

    function loadContextInclusion() {
      try {
        const saved = JSON.parse(localStorage.getItem(contextInclusionStorageKey) || "null");
        if (saved && typeof saved === "object") {
          return Object.fromEntries(Object.entries(defaultContextInclusion).map(([key, value]) => [key, saved[key] ?? value]));
        }
      } catch {}
      return { ...defaultContextInclusion };
    }

    function saveContextInclusion() {
      localStorage.setItem(contextInclusionStorageKey, JSON.stringify(contextInclusion));
    }

    function learningModeTitle(value = coachPreference.learningMode) {
      return optionByValue(learningModes, value)?.[1] || "拍题";
    }

    function coachDepthTitle(value = coachPreference.coachDepth) {
      return optionByValue(coachDepths, value)?.[1] || "先提示";
    }

    function learningModePhrase(value = coachPreference.learningMode) {
      const option = optionByValue(learningModes, value);
      return `学习场景=${option[1]}，${option[2]}`;
    }

    function coachDepthPhrase(value = coachPreference.coachDepth) {
      const option = optionByValue(coachDepths, value);
      return `回答方式=${option[1]}，${option[2]}`;
    }

    function coachReportStyle() {
      return `${learningModePhrase()}；${coachDepthPhrase()}；PC端三栏工作台`;
    }

    function coachAssistantFocus() {
      return [
        "学习教练偏好",
        learningModePhrase(),
        coachDepthPhrase(),
        "优先围绕当前问题、当前抓拍缩略图和本回合上下文回答",
        "需要复盘时，把错因、知识点、下一步小任务写清楚"
      ].join("；");
    }

    function contextEnabledLabels() {
      return Object.entries(contextInclusion)
        .filter(([, enabled]) => enabled)
        .map(([key]) => contextLabels[key])
        .filter(Boolean);

    function syncCoachPreferenceFromSession(session = {}) {

      return Math.max(min, Math.min(max, value));

    function workspaceWidth() {
      return workspaceEl?.getBoundingClientRect().width || window.innerWidth;

    function clampedPaneLayout(next = paneLayout) {
      const total = workspaceWidth();
      const handleTotal = 16;
      const minHistory = 220;
      const minChat = 460;
      const minContext = 300;
      const maxSide = Math.max(minHistory, total - minChat - minContext - handleTotal);
      let history = clamp(Number(next.history) || defaultPaneLayout.history, minHistory, Math.min(420, maxSide));
      const maxContext = Math.max(minContext, total - minChat - history - handleTotal);
      let context = clamp(Number(next.context) || defaultPaneLayout.context, minContext, Math.min(560, maxContext));
      const remainingChat = total - history - context - handleTotal;
      if (remainingChat < minChat) {
        const shortage = minChat - remainingChat;
        const contextRoom = Math.max(0, context - minContext);
        const contextReduction = Math.min(shortage, contextRoom);
        context -= contextReduction;
        history = clamp(history - (shortage - contextReduction), minHistory, Math.min(420, maxSide));
      }
      return { history: Math.round(history), context: Math.round(context) };
    }

    function applyPaneLayout(save = false) {
      if (!workspaceEl) return;
      if (!isResizableWorkspace()) {
        document.documentElement.style.removeProperty("--history-width");
        document.documentElement.style.removeProperty("--context-width");
        return;
      }
      paneLayout = clampedPaneLayout(paneLayout);
      document.documentElement.style.setProperty("--history-width", `${paneLayout.history}px`);
      document.documentElement.style.setProperty("--context-width", `${paneLayout.context}px`);
      if (save) {
        localStorage.setItem(paneLayoutStorageKey, JSON.stringify(paneLayout));
      }
    }

    function loadPaneLayout() {
      try {
        const saved = JSON.parse(localStorage.getItem(paneLayoutStorageKey) || "null");
        if (saved && typeof saved === "object") {
          paneLayout = {
            history: Number(saved.history) || defaultPaneLayout.history,
            context: Number(saved.context) || defaultPaneLayout.context
          };
        }
      } catch {
        paneLayout = { ...defaultPaneLayout };
      }
      applyPaneLayout(false);
    }

    function setupPaneResizers() {
      document.querySelectorAll("[data-resizer]").forEach(handle => {
        handle.addEventListener("pointerdown", event => {
          if (!isResizableWorkspace()) return;
          event.preventDefault();
          handle.setPointerCapture?.(event.pointerId);
          const side = handle.dataset.resizer;
          const startX = event.clientX;
          const start = { ...paneLayout };
          handle.classList.add("active");
          document.body.classList.add("resizing-panes");

          const onPointerMove = moveEvent => {
            const delta = moveEvent.clientX - startX;
            if (side === "history") {
              paneLayout = clampedPaneLayout({ ...start, history: start.history + delta });
            } else {
              paneLayout = clampedPaneLayout({ ...start, context: start.context - delta });
            }
            applyPaneLayout(false);
          };

          const finish = () => {
            handle.classList.remove("active");
            document.body.classList.remove("resizing-panes");
            window.removeEventListener("pointermove", onPointerMove);
            window.removeEventListener("pointerup", finish);
            window.removeEventListener("pointercancel", finish);
            applyPaneLayout(true);
          };

          window.addEventListener("pointermove", onPointerMove);
          window.addEventListener("pointerup", finish, { once: true });
          window.addEventListener("pointercancel", finish, { once: true });
        });
      });
      window.addEventListener("resize", () => applyPaneLayout(false));
    }

            filename: event.uploaded_image_filename,
            kind: "qa",
            created_at: event.created_at,
            captured_at: event.created_at,
            source_label: "未采用抓拍",
            rejected: true
          } : null
        ])
        .filter(Boolean);
      const seen = new Set();
      return [...images, ...qaImages]
        .filter(image => image?.filename && !seen.has(image.filename) && seen.add(image.filename))
        .sort((a, b) => String(b.captured_at || b.created_at || "").localeCompare(String(a.captured_at || a.created_at || "")) || Number(b.sequence_index || 0) - Number(a.sequence_index || 0))
        .slice(0, limit);
    }

    function truncateText(value, limit = 1200) {
      const text = String(value || "").trim();
      return text.length > limit ? `${text.slice(0, limit - 1)}…` : text;
    }

      const tmp = document.createElement("div");
      tmp.innerHTML = safeQAHtml(event);

            body: truncateText(plainQAAnswer(event), 1400),

              ["voice_question", "继续语音", ""]
            ]

        });

        if (finalAnalysis || session.summary) {
          messages.push({
            role: "assistant",
            title: "全回合解析",
            body: truncateText(finalAnalysis?.content || session.summary || "全回合解析生成中...", 1600),
            actions: [
              ["materials", "查看全文", "primary"],
              ["learning", "学习清单", ""],
              ["mistakes", "错题本", ""]
            ]
          });

      chatThreadEl.innerHTML = messages.map(message => {
        const time = message.time ? ` · ${escapeHtml(new Date(message.time).toLocaleString())}` : "";
        const image = message.image
          ? `<div class="message-actions"><button type="button" data-open-image="${escapeHtml(message.image)}">查看画面</button></div>`
          : "";
        const actions = (message.actions || []).map(([action, label, cls]) => {
          if (["learning", "mistakes", "strategy", "review", "profile"].includes(action)) {
            return `<button class="${cls || ""}" type="button" data-open-panel="${action}">${escapeHtml(label)}</button>`;
          }
          if (action === "live") return `<button class="${cls || ""}" type="button" data-context-button="live">${escapeHtml(label)}</button>`;
          if (action === "materials") return `<button class="${cls || ""}" type="button" data-context-button="materials">${escapeHtml(label)}</button>`;
          return `<button class="${cls || ""}" type="button" data-command="${action}">${escapeHtml(label)}</button>`;
        }).join("");
        const visualizationAction = message.visualizationSourceType

          : "";

          <article class="chat-message ${message.role}">
            <div class="message-meta"><span>${escapeHtml(message.title || "")}${time}</span></div>
            <div class="chat-bubble">${escapeHtml(message.body || "")}</div>

        img.onerror = () => img.closest(".message-capture")?.classList.add("image-error");

    async function createChatSession(initialGoal = "") {
      const form = new FormData();
      form.append("device_id", "dashboard");
      form.append("mode", "qa");
      form.append("title", "网页聊天学习回合");
      form.append("report_style", coachReportStyle());
      form.append("assistant_focus", coachAssistantFocus());
      const goal = coachPreference.studentGoal || initialGoal;
      if (goal) form.append("student_goal", goal);
      const res = await fetch("/api/sessions", { method: "POST", body: form });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      current = data.session_id;
      shouldAutoSelectSession = true;
      sessionData = null;
      history.replaceState(null, "", current ? `/?session_id=${encodeURIComponent(current)}` : "/");
      await loadSessions();
      await loadSession(true);
      return current;
    }

    async function syncCoachPreference() {
      const studentGoalInput = coachPanelEl.querySelector("[data-coach-field='studentGoal']");
      if (studentGoalInput) {
        coachPreference.studentGoal = String(studentGoalInput.value || "").trim();
        saveCoachPreference();
      }
      coachSubmitting = true;
      renderCoachPanel();
      try {
        if (current) {
          const res = await fetch(`/api/sessions/${current}/strategy`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              student_goal: coachPreference.studentGoal,
              report_style: coachReportStyle(),
              assistant_focus: coachAssistantFocus()
            })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          await loadSession(true);
        }
        if (deviceControlData?.latest_device) {
          await sendControlCommand("set_goal", {
            student_goal: coachPreference.studentGoal,
            learning_mode: coachPreference.learningMode,
            coach_depth: coachPreference.coachDepth,
            report_style: coachReportStyle(),
            assistant_focus: coachAssistantFocus()
          }, { silentNoDevice: true });
        }
      } catch (error) {
        alert(`同步学习教练失败：${error.message || error}`);
      } finally {
        coachSubmitting = false;
        renderCoachPanel();
        renderComposerStatus();
      }
    }

    function safeQAHtml(event) {
      const html = String(event.answer_html || "");
      if (html.includes("<script") || html.includes("onerror=") || html.includes("onload=")) {
        return `<div class="qa-plain-text">${escapeHtml(event.answer || "等待回答...")}</div>`;
      }
      return html || `<div class="qa-plain-text">${escapeHtml(event.answer || "等待回答...")}</div>`;
    }

    function formatLabel(value, fallback = "未知") {
      return escapeHtml(value || fallback);

      return { single: "单张解析", batch: "批次解析" }[scope] || escapeHtml(scope || "解析");
    }

    function imagesForAnalysis(analysis, images) {
      if (analysis.scope === "batch" && analysis.batch_id) {
        return images.filter(img => img.batch_id === analysis.batch_id);
      }
      if (analysis.scope === "single") {
        const singles = images.filter(img => img.kind === "single" && !img.batch_id);
        return singles.length ? singles : images.filter(img => !img.batch_id);
      }
      return [];
    }

    function parseList(value) {
      if (Array.isArray(value)) return value;
      if (!value) return [];
      try {
        const parsed = JSON.parse(value);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];

    }

    function learningMeta(items = []) {

        const key = item.item_type || "unknown";

      return total
        ? `题目 ${counts.question || 0} · 板块 ${counts.section || 0} · 知识点 ${counts.knowledge || 0} · 作答 ${counts.answer || 0}`
