          </button>
          <button class="control-button primary" type="button" data-command="voice_question" ${controlSubmitting ? "disabled" : ""}>
            <strong>语音提问</strong><span class="muted">${escapeHtml(state.qa_state || "让 iPhone 开始听")}</span>
          </button>
          <button class="control-button" type="button" data-command="ok_followup" ${controlSubmitting ? "disabled" : ""}>
            <strong>OK 追问</strong><span class="muted">打断朗读并继续问</span>
          </button>
          <button class="control-button danger wide" type="button" data-command="end_qa" ${controlSubmitting ? "disabled" : ""}>
            <strong>结束问答</strong><span class="muted">停止本轮语音/朗读状态</span>
          </button>
        </div>
        <form class="control-goal" data-control-goal>
          <textarea name="goal" rows="1" maxlength="1200" placeholder="同步到 iPhone 的本轮帮助目标">${goalValue}</textarea>
          <button type="submit" ${controlSubmitting ? "disabled" : ""}>同步目标</button>
        </form>
        <div class="command-list">${commandRows || `<span class="muted">暂无远程命令</span>`}</div>`;
      deviceControlEl.querySelectorAll("[data-command]").forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          sendControlCommand(button.dataset.command);
        };
      });
      const form = deviceControlEl.querySelector("[data-control-goal]");
      if (form) form.onsubmit = event => {
        event.preventDefault();
        const goal = String(form.querySelector("textarea[name='goal']")?.value || "").trim();
        sendControlCommand("set_goal", { student_goal: goal });
      };
    }

    async function loadDeviceControl() {
      if (authState.auth?.auth_required && !authState.authenticated) return;
      const params = new URLSearchParams();
      if (current) params.set("session_id", current);
      try {
        let res = await fetch(`/api/device-control?${params.toString()}`, { headers: controlHeaders() });
        if (res.status === 401 && promptControlToken()) {
          res = await fetch(`/api/device-control?${params.toString()}`, { headers: controlHeaders() });
        }
        if (!res.ok) return;
        deviceControlData = await res.json();
        const state = deviceControlData?.latest_device?.state || {};
        if (state.learning_mode || state.coach_depth || state.student_goal) {
          let changed = false;
          if (state.learning_mode && optionByValue(learningModes, state.learning_mode)?.[0] !== coachPreference.learningMode) {
            coachPreference.learningMode = optionByValue(learningModes, state.learning_mode)[0];
            changed = true;
          }
          if (state.coach_depth && optionByValue(coachDepths, state.coach_depth)?.[0] !== coachPreference.coachDepth) {
            coachPreference.coachDepth = optionByValue(coachDepths, state.coach_depth)[0];
            changed = true;
          }
          if (state.student_goal && state.student_goal !== coachPreference.studentGoal) {
            coachPreference.studentGoal = String(state.student_goal);
            changed = true;
          }
          if (changed) {
            saveCoachPreference();
            renderComposerStatus();
            renderCoachPanel();
          }
        }
        renderDeviceControl();
      } catch {
        deviceControlEl.innerHTML = `<div class="muted">iPhone 控制状态暂时不可用</div>`;
      }
    }

    async function sendControlCommand(commandType, payload = {}, options = {}) {
      controlSubmitting = true;
      renderDeviceControl();
      try {
        let res = await fetch("/api/control-commands", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...controlHeaders() },
          body: JSON.stringify({
            command_type: commandType,
            session_id: current || "",
            source: "dashboard",
            payload
          })
        });
        if (res.status === 401 && promptControlToken()) {
          res = await fetch("/api/control-commands", {
            method: "POST",
            headers: { "Content-Type": "application/json", ...controlHeaders() },
            body: JSON.stringify({
              command_type: commandType,
              session_id: current || "",
              source: "dashboard",
              payload
            })
          });
        }
        if (!res.ok) {
          const text = await res.text();
          if (options.silentNoDevice && res.status === 409) return;
          throw new Error(text || `HTTP ${res.status}`);
        }
        await loadDeviceControl();
      } catch (error) {
        alert(`远程控制失败：${error.message || error}`);
      } finally {
        controlSubmitting = false;
        renderDeviceControl();
      }
    }

    function renderReportEvents(events = []) {
      const rows = events.slice(0, 20).map(event => `
        <div class="learning-item">
          <span class="learning-type process-type">${escapeHtml(event.event_type || "event")}</span>
          <strong>${escapeHtml(event.title || "生成依据")}</strong>
          <div class="muted">${escapeHtml(event.created_at || "未知")}</div>
          <div>${escapeHtml(event.content || "")}</div>
        </div>`).join("");
      processEl.innerHTML = `
        <div class="learning-head">
          <strong>报告生成依据</strong>
          <span class="muted">${events.length ? `${events.length} 条过程记录` : "暂无过程记录"}</span>
        </div>
        <div class="learning-grid">${rows || `<div class="muted">学生要求、策略更新、批次学习资产和最终报告上下文会记录在这里。</div>`}</div>`;
    }

    function renderQAEvents(events = []) {
      const rows = events.slice(0, 12).map(event => {
        const usedFilename = event.selected_image_filename || event.image_filename;
        const uploadedFilename = event.uploaded_image_filename || "";
        const image = usedFilename
          ? `<a class="qa-image-link" href="/images/${encodeURIComponent(usedFilename)}" target="_blank" rel="noopener">查看画面</a>`
          : "";
        const uploadedImage = uploadedFilename && uploadedFilename !== usedFilename
          ? `<a class="qa-image-link" href="/images/${encodeURIComponent(uploadedFilename)}" target="_blank" rel="noopener">本轮抓拍未采用</a>`
          : "";
        const frame = usedFilename
          ? `<a class="qa-frame-preview" href="/images/${encodeURIComponent(usedFilename)}" target="_blank" rel="noopener">
              <img src="/api/images/${encodeURIComponent(usedFilename)}/thumbnail" alt="本轮画面">
              <span>${event.image_context_mode === "current_frame" ? "本轮画面" : "沿用画面"}</span>
            </a>`
          : "";
        const visualizationAction = renderVisualizationAction("qa_event", event);
        return `
          <div class="qa-turn">
            <div class="qa-question-row">
              <div class="qa-question">
                <span class="learning-type process-type">${escapeHtml(event.trigger_type || "qa")}</span>
                <strong>${escapeHtml(event.question || "未记录问题")}</strong>
                <div class="muted">${escapeHtml(event.created_at || "未知")} · ${escapeHtml(event.status || "running")}</div>
              </div>
              ${image}${uploadedImage}
            </div>
            ${visualizationAction}
            <div class="${frame ? "qa-answer-layout" : ""}">
              ${frame}
              ${safeQAHtml(event)}
            </div>
          </div>`;
      }).join("");
      qaEventsEl.innerHTML = `
        <div class="learning-head">
          <strong>AI 问答记录</strong>
          <span class="muted">${events.length ? `${events.length} 轮问答` : "暂无问答"}</span>
        </div>
        <form class="qa-followup-form" data-qa-followup>
          <label>
            继续追问
            <textarea class="qa-followup-input" name="question" rows="1" placeholder="例如：为什么这里要这样算？第二题再讲一遍。"></textarea>
          </label>
          <button class="qa-followup-button" type="submit" ${current ? "" : "disabled"}>${qaSubmitting ? "发送中..." : "发送"}</button>
        </form>
        <div class="qa-thread">${rows || `<div class="muted">语音、指向、OK 追问和结束手势触发的问答会显示在这里。</div>`}</div>`;
      const form = qaEventsEl.querySelector("[data-qa-followup]");
      if (form) form.onsubmit = submitQAFollowup;
    }

    async function submitQAFollowup(event) {
      event.preventDefault();
      if (!current || qaSubmitting) return;
      const form = event.currentTarget;
      const input = form.querySelector("textarea[name='question']");
      const question = String(input?.value || "").trim();
      if (!question) {
        input?.focus();
        return;
      }
      await sendChatQuestion(question, {
        input,
        triggerType: "dashboard_followup",
        source: "dashboard",
        ui: "dashboard_followup"
      });
    }

    async function sendChatQuestion(question, options = {}) {
      if (qaSubmitting) return;
      if (authState.auth?.auth_required && !authState.authenticated) {
        openAccountDialog("login");
        return;
      }
      if (!current) {
        await createChatSession(question.slice(0, 120));
      }
      if (!current) return;
      qaSubmitting = true;
      chatSendEl.disabled = true;
      renderQAEvents(sessionData?.qa_events || []);
      renderChatMessages(sessionData);
      const body = new FormData();
      body.append("question", question);
      body.append("trigger_type", options.triggerType || "dashboard_chat");
      body.append("source", options.source || "dashboard");
      body.append("context", JSON.stringify(qaContextPayload(question, options)));
      try {
        const res = await fetch(`/api/sessions/${current}/qa`, { method: "POST", body });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        if (options.input) options.input.value = "";
        await loadSession(true);
      } catch (error) {
        alert(`追问失败：${error.message || error}`);
      } finally {
        qaSubmitting = false;
        chatSendEl.disabled = false;
        renderQAEvents(sessionData?.qa_events || []);
        renderChatMessages(sessionData);
      }
    }

    function renderAnalysisRow(analysis, images) {
      const matchedImages = imagesForAnalysis(analysis, images);
      const visualizationAction = renderVisualizationAction("analysis", analysis);
      const batch = analysis.batch_id ? ` · batch ${escapeHtml(analysis.batch_id.slice(0, 8))}` : "";
      return `
        <div class="pair-row">
          <div class="thumbs">${renderThumbs(matchedImages)}</div>
          <article class="analysis-card">
            <strong class="analysis-title">${scopeLabel(analysis.scope)} · ${formatLabel(analysis.status, "pending")}${batch}</strong>${escapeHtml(analysis.content || "分析中...")}
          </article>
        </div>`;
    }

    function attachAnalysisVisualizationActions(analyses = []) {
      pairsEl.querySelectorAll(".analysis-card").forEach((card, index) => {
        const analysis = analyses[index];
        if (!analysis || !visualizationLabel(analysis) || card.querySelector("[data-visualize-source='analysis']")) return;
        const title = card.querySelector(".analysis-title");
        if (title) title.insertAdjacentHTML("afterend", renderVisualizationAction("analysis", analysis));
      });
    }

    function latestFinalAnalysis(analyses) {
      return analyses.filter(analysis => analysis.scope === "final").at(-1);
    }

    function renderSummary(data) {
      const finalAnalysis = data.final_analysis || latestFinalAnalysis(data.analyses);
      const generatedSummary = data.session.report_generated_at && data.session.summary;
      const title = finalAnalysis
        ? `全回合解析 · ${formatLabel(finalAnalysis.status, "pending")}`
        : "全回合解析";
      let body = "尚未生成全回合解析。请在 iPhone 端结束本回合，或点击右侧按钮生成。";
      let canGenerate = data.images.length > 0;

      if (finalAnalysis) {
        body = finalAnalysis.content || "全回合解析生成中...";
        canGenerate = finalAnalysis.status === "failed";
      } else if (generatedSummary) {
        body = data.session.summary;
        canGenerate = false;
      }

      const action = canGenerate
        ? `<button class="summary-action" type="button" data-finish>生成全回合解析</button>`
        : "";
      summaryEl.innerHTML = `<div class="summary-head"><strong>${title}</strong>${action}</div>${escapeHtml(body)}`;
      const button = summaryEl.querySelector("[data-finish]");
      if (button) button.onclick = finishSession;
    }

    function mergeUniqueById(items) {
      const seen = new Set();
      return items.filter(item => {
        if (!item || seen.has(item.id)) return false;
        seen.add(item.id);
        return true;
      });
    }

    function mergeSessionPage(existing, page) {
      if (!existing || existing.session.id !== page.session.id) return page;
      return {
        ...page,
        images: mergeUniqueById([...page.images, ...existing.images])
          .sort((a, b) => (a.sequence_index || 0) - (b.sequence_index || 0) || String(a.created_at).localeCompare(String(b.created_at))),
        analyses: mergeUniqueById([...page.analyses, ...existing.analyses])
          .sort((a, b) => String(a.created_at).localeCompare(String(b.created_at))),
        has_more_analyses: page.analysis_count > mergeUniqueById([...page.analyses, ...existing.analyses]).length
      };
    }

    function renderSession(data) {
      syncCoachPreferenceFromSession(data.session || {});
      const pairedAnalyses = data.analyses.filter(analysis => analysis.scope !== "final");
      renderChatMessages(data);
      renderCaptureStrip(data);
      renderSummary(data);
      renderPanelLaunch(data);
      renderCoachPanel();
      renderMemoryPanel();
      renderQAEvents(data.qa_events || []);
      renderReportEvents(data.report_events || []);
      const rows = pairedAnalyses.length
        ? pairedAnalyses.map(analysis => renderAnalysisRow(analysis, data.images)).join("")
        : `<div class="pair-row"><div class="thumbs">${renderThumbs(data.images)}</div><article class="analysis-card">等待大模型解析...</article></div>`;
      const loaded = pairedAnalyses.length;
      const total = Number(data.analysis_count || loaded);
      const more = data.has_more_analyses
        ? `<button class="load-more" type="button" data-load-more>加载更多解析（${loaded}/${total}）</button>`
        : "";
      pairsEl.innerHTML = rows + more;
      attachAnalysisVisualizationActions(pairedAnalyses);
      pairsEl.querySelectorAll("img[data-full]").forEach(img => {
        img.onclick = () => zoom(img.dataset.full);
        img.onerror = () => img.parentElement.classList.add("image-error");
      });
      captureStripEl.querySelectorAll("[data-open-image]").forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          if (button.classList.contains("image-error")) return;
          zoom(imageUrl(button.dataset.openImage));
        };
      });
      captureStripEl.querySelectorAll("img").forEach(img => {
        img.onerror = () => img.closest(".capture-tile")?.classList.add("image-error");
      });
      const loadMoreButton = pairsEl.querySelector("[data-load-more]");
      if (loadMoreButton) loadMoreButton.onclick = loadMoreAnalyses;
    }

    async function loadSession(replace = false) {
      if (authState.auth?.auth_required && !authState.authenticated) return;
      if (!current || sessionLoading) return;
      sessionLoading = true;
      try {
        const res = await fetch(`/api/sessions/${current}/overview?analysis_limit=${analysisPageSize}`);
        if (!res.ok) return;
        const data = await res.json();
        sessionData = replace ? data : mergeSessionPage(sessionData, data);
        renderSession(sessionData);
      } finally {
        sessionLoading = false;
      }
    }

    async function loadMoreAnalyses() {
      if (!current || !sessionData) return;
      const button = pairsEl.querySelector("[data-load-more]");
      if (button) {
        button.disabled = true;
        button.textContent = "加载中...";
      }
      const offset = sessionData.analyses.length;
      const res = await fetch(`/api/sessions/${current}/overview?analysis_limit=${analysisPageSize}&analysis_offset=${offset}`);
      if (!res.ok) return;
      const data = await res.json();
      sessionData = mergeSessionPage(sessionData, data);
      renderSession(sessionData);
    }

    async function finishSession() {
      const button = summaryEl.querySelector("[data-finish]");
      if (button) {
        button.disabled = true;
        button.textContent = "生成中...";
      }
      const form = new FormData();
      form.append("device_id", "dashboard");
      const res = await fetch(`/api/sessions/${current}/finish`, { method: "POST", body: form });
      if (!res.ok) {
        summaryEl.innerHTML = `<div class="summary-head"><strong>全回合解析</strong></div>${escapeHtml("触发失败，请稍后重试。")}`;
        return;
      }
      await loadSession();
    }

    function zoom(src) {
      document.querySelector("#zoomImg").src = src;
      document.querySelector("#zoom").showModal();
    }

    async function loadLogs() {
      if (authState.auth?.auth_required && !authState.authenticated) return;
      const res = await fetch(`/api/logs?after_id=${lastLog}`);
      const data = await res.json();
      for (const log of data.logs) {
        lastLog = Math.max(lastLog, log.id);
        const div = document.createElement("div");
        div.className = "log";
        div.textContent = `[${new Date(log.created_at).toLocaleTimeString()}] ${log.source}/${log.level}: ${log.message}`;
        logsEl.append(div);
      }
      while (logsEl.children.length > 200) logsEl.firstChild.remove();
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function handleWorkspaceClick(event) {
      const visualizeButton = event.target.closest("[data-visualize-source]");
      if (visualizeButton) {
        event.preventDefault();
        generateVisualization(visualizeButton);
        return;
      }
      const urlLink = event.target.closest("[data-open-url]");
      if (urlLink) {
        event.preventDefault();
        openInlinePage(urlLink.dataset.openUrl, urlLink.dataset.openTitle || urlLink.textContent.trim(), urlLink.dataset.openMeta || "");
        return;
      }
      const assetsLink = event.target.closest("[data-open-assets]");
      if (assetsLink) {
        event.preventDefault();
        openAssets(assetsLink.dataset.openAssets || "");
        return;
      }
      const panelButton = event.target.closest("[data-open-panel]");
      if (panelButton) {
        openSessionPanel(panelButton.dataset.openPanel);
        return;
      }
      const commandButton = event.target.closest("[data-command]");
      if (commandButton) {
        sendControlCommand(commandButton.dataset.command);
        return;
      }
      const contextButton = event.target.closest("[data-context-button]");
      if (contextButton) {
        switchContext(contextButton.dataset.contextButton);
        return;
      }
      const imageButton = event.target.closest("[data-open-image]");
      if (imageButton) {
        zoom(`/images/${encodeURIComponent(imageButton.dataset.openImage)}`);
      }
    }

    contextTabsEl.addEventListener("click", event => {
      const button = event.target.closest("[data-context]");
      if (!button) return;
      switchContext(button.dataset.context);
    });

    document.querySelectorAll("[data-auth-tab]").forEach(button => {
      button.onclick = () => setAuthTab(button.dataset.authTab);
    });
    accountButtonEl.onclick = () => openAccountDialog(authState.authenticated ? "login" : "login");
    modelButtonEl.onclick = () => openAccountDialog(authState.authenticated ? "login" : "login");
    closeAccountDialogEl.onclick = () => accountDialogEl.close();
    loginFormEl.onsubmit = event => {
      event.preventDefault();
      submitAuthForm(loginFormEl, "login");
    };
    registerFormEl.onsubmit = event => {
      event.preventDefault();
      submitAuthForm(registerFormEl, "register");
    };
    logoutButtonEl.onclick = async () => {
      setAuthToken("");
      authState = { authenticated: false, auth: authState.auth || {}, profiles: [], active_model_config: null };
      current = "";
      sessionData = null;
      latestMemoryData = null;
      latestObservability = null;
      history.replaceState(null, "", "/");
      renderAccountPanel();
      accountDialogEl.close();
      await loadAuthState({ refreshData: true });
    };
    modelFormEl.onsubmit = submitModelConfig;

    document.querySelector(".header-actions").addEventListener("click", handleWorkspaceClick);
    chatThreadEl.addEventListener("click", handleWorkspaceClick);
    document.querySelector(".composer-tools").addEventListener("click", handleWorkspaceClick);
    contextStackEl.addEventListener("click", handleWorkspaceClick);

    chatComposerEl.onsubmit = async event => {
      event.preventDefault();
      const question = chatInputEl.value.trim();
      if (!question) {
        chatInputEl.focus();
        return;
      }
      await sendChatQuestion(question, { input: chatInputEl });
    };

    chatInputEl.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatComposerEl.requestSubmit();
      }
    });

    newSessionButton.onclick = () => {
      current = "";
      shouldAutoSelectSession = false;
      sessionData = null;
      history.replaceState(null, "", "/");
      renderChatMessages(null);
      renderCaptureStrip(null);
      renderCoachPanel();
      loadSessions();
      chatInputEl.focus();
    };

    openLiveContextButton.onclick = () => switchContext("materials");

    loadPaneLayout();
    setupPaneResizers();
    renderChatMessages(null);
    renderCaptureStrip(null);
    renderCoachPanel();
    renderMemoryPanel();

    setInterval(loadSessions, 5000);
    setInterval(() => loadSession(), 3000);
    setInterval(loadDeviceControl, 2000);
    setInterval(loadMemory, 30000);
    setInterval(loadObservability, 10000);
    setInterval(loadLogs, 1000);
    loadAuthState({ refreshData: true }).then(() => {
      loadDeviceControl();
      loadLogs();
    });
  </script>
</body>
</html>
