<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xue 提示词配置</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f7f9; color: #15171a; }
    header { height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 18px; background: #fff; border-bottom: 1px solid #dde1e7; }
    h1 { font-size: 18px; margin: 0; }
    a { color: #175cd3; text-decoration: none; }
    main { display: grid; grid-template-columns: 320px minmax(0, 1fr); height: calc(100vh - 56px); }
    aside { overflow: auto; border-right: 1px solid #dde1e7; background: #fff; }
    button.prompt-tab { width: 100%; border: 0; border-bottom: 1px solid #edf0f3; background: transparent; padding: 14px; text-align: left; cursor: pointer; }
    button.prompt-tab:hover, button.prompt-tab.active { background: #eef5ff; }
    button.prompt-tab strong { display: block; margin-bottom: 4px; }
    .badge { display: inline-flex; align-items: center; min-height: 20px; padding: 2px 7px; border: 1px solid #b9c4d0; border-radius: 999px; color: #475467; font-size: 12px; }
    .badge.custom { border-color: #84caff; color: #175cd3; background: #eff8ff; }
    .muted { color: #667085; font-size: 12px; line-height: 1.45; }
    .editor { display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto; gap: 12px; padding: 16px; overflow: hidden; }
    .panel { background: #fff; border: 1px solid #dde1e7; border-radius: 8px; padding: 14px; }
    .title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .title-row h2 { margin: 0 0 6px; font-size: 17px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    button.action { border: 1px solid #b9c4d0; border-radius: 6px; background: #fff; color: #1d2939; padding: 8px 11px; cursor: pointer; font-size: 13px; }
    button.action.primary { border-color: #175cd3; background: #175cd3; color: #fff; }
    button.action.danger { border-color: #fda29b; color: #b42318; }
    button.action:hover { filter: brightness(.98); }
    button.action:disabled { cursor: wait; color: #98a2b3; border-color: #d0d5dd; background: #f2f4f7; }
    .vars { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .var { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; border: 1px solid #c7d7fe; background: #eef4ff; color: #3538cd; border-radius: 999px; padding: 3px 7px; }
    textarea { width: 100%; height: 100%; resize: none; border: 1px solid #b9c4d0; border-radius: 8px; padding: 12px; font: 13px/1.55 ui-monospace, SFMono-Regular, Consolas, monospace; color: #101828; background: #fff; outline: none; }
    textarea:focus { border-color: #175cd3; box-shadow: 0 0 0 3px rgba(23, 92, 211, .12); }
    .status { min-height: 22px; color: #667085; font-size: 13px; }
    .status.error { color: #b42318; }
    .status.ok { color: #067647; }
    .empty { height: 100%; display: grid; place-items: center; color: #667085; }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; height: auto; min-height: calc(100vh - 56px); }
      aside { max-height: 260px; }
      .editor { min-height: 640px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>提示词配置</h1>
    <div class="actions">
      <a class="muted" href="/">返回展示页</a>
      <button class="action danger" type="button" id="resetAll">全部恢复默认</button>
    </div>
  </header>
  <main>
    <aside id="promptList"></aside>
    <section class="editor">
      <div class="panel" id="meta"></div>
      <textarea id="content" spellcheck="false"></textarea>
      <div class="panel" id="defaultBox"></div>
      <div class="title-row">
        <div class="status" id="status"></div>
        <div class="actions">
          <button class="action" type="button" id="resetOne">恢复默认</button>
          <button class="action primary" type="button" id="save">保存</button>
        </div>
      </div>
    </section>
  </main>
  <script>
    (function () {
      // Per-account prompts: forward the saved auth token so the backend scopes
      // edits to the logged-in user's account (matches assets.html/session-panel.html).
      const authTokenStorageKey = "xue.authToken";
      const originalFetch = window.fetch.bind(window);
      window.fetch = (input, init = {}) => {
        const url = typeof input === "string" ? input : (input && input.url) || "";
        const target = new URL(url, location.href);
        const headers = new Headers(init.headers || (typeof input !== "string" ? input.headers : undefined) || {});
        const token = localStorage.getItem(authTokenStorageKey) || "";
        if (token && target.origin === location.origin && !headers.has("Authorization")) {
          headers.set("Authorization", `Bearer ${token}`);
        }
        return originalFetch(input, { ...init, headers, credentials: init.credentials || "same-origin" });
      };
    })();
    let prompts = [];
    let currentKey = "";
    const listEl = document.querySelector("#promptList");
    const metaEl = document.querySelector("#meta");
    const defaultBoxEl = document.querySelector("#defaultBox");
    const contentEl = document.querySelector("#content");
    const statusEl = document.querySelector("#status");
    const saveButton = document.querySelector("#save");
    const resetOneButton = document.querySelector("#resetOne");
    const resetAllButton = document.querySelector("#resetAll");

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function currentPrompt() {
      return prompts.find(prompt => prompt.key === currentKey);
    }

    function setStatus(message, kind = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${kind}`;
    }

    function renderList() {
      listEl.innerHTML = prompts.map(prompt => `
        <button class="prompt-tab ${prompt.key === currentKey ? "active" : ""}" type="button" data-key="${escapeHtml(prompt.key)}">
          <strong>${escapeHtml(prompt.label)}</strong>
          <span class="muted">${escapeHtml(prompt.key)}</span><br>
          <span class="badge ${prompt.is_custom ? "custom" : ""}">${prompt.is_custom ? "已自定义" : "默认"}</span>
        </button>
      `).join("");
      listEl.querySelectorAll("[data-key]").forEach(button => {
        button.onclick = () => {
          currentKey = button.dataset.key;
          render();
        };
      });
    }

    function render() {
      renderList();
      const prompt = currentPrompt();
      if (!prompt) {
        metaEl.innerHTML = `<div class="empty">暂无提示词配置</div>`;
        defaultBoxEl.innerHTML = "";
        contentEl.value = "";
        return;
      }
      const vars = prompt.variables.length
        ? `<div class="vars">${prompt.variables.map(name => `<span class="var">{${escapeHtml(name)}}</span>`).join("")}</div>`
        : `<div class="muted">无模板变量。</div>`;
      metaEl.innerHTML = `
        <div class="title-row">
          <div>
            <h2>${escapeHtml(prompt.label)}</h2>
            <div class="muted">${escapeHtml(prompt.description)}</div>
            ${vars}
          </div>
          <span class="badge ${prompt.is_custom ? "custom" : ""}">${prompt.is_custom ? "已自定义" : "默认"}</span>
        </div>
      `;
      contentEl.value = prompt.content;
      defaultBoxEl.innerHTML = `
        <strong>默认内容</strong>
        <div class="muted" style="white-space: pre-wrap; margin-top: 8px;">${escapeHtml(prompt.default_content)}</div>
      `;
      setStatus(prompt.updated_at ? `上次更新：${new Date(prompt.updated_at).toLocaleString()}` : "当前使用默认提示词。");
    }

    async function loadPrompts(keepCurrent = true) {
      const res = await fetch("/api/prompts");
      const data = await res.json();
      prompts = data.prompts || [];
      if (!keepCurrent || !prompts.some(prompt => prompt.key === currentKey)) {
        currentKey = prompts[0]?.key || "";
      }
      render();
    }

    async function saveCurrent() {
      const prompt = currentPrompt();
      if (!prompt) return;
      saveButton.disabled = true;
      setStatus("保存中...");
      const res = await fetch(`/api/prompts/${encodeURIComponent(prompt.key)}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: contentEl.value })
      });
      saveButton.disabled = false;
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        setStatus(data.detail || "保存失败", "error");
        return;
      }
      await loadPrompts(true);
      setStatus("已保存。", "ok");
    }

    async function resetCurrent() {
      const prompt = currentPrompt();
      if (!prompt) return;
      resetOneButton.disabled = true;
      const res = await fetch(`/api/prompts/${encodeURIComponent(prompt.key)}/reset`, { method: "POST" });
      resetOneButton.disabled = false;
      if (!res.ok) {
        setStatus("恢复默认失败", "error");
        return;
      }
      await loadPrompts(true);
      setStatus("已恢复默认。", "ok");
    }

    async function resetAll() {
      if (!confirm("确定恢复全部提示词为默认值？")) return;
      resetAllButton.disabled = true;
      const res = await fetch("/api/prompts/reset", { method: "POST" });
      resetAllButton.disabled = false;
      if (!res.ok) {
        setStatus("全部恢复默认失败", "error");
        return;
      }
      await loadPrompts(true);
      setStatus("全部提示词已恢复默认。", "ok");
    }

    saveButton.onclick = saveCurrent;
    resetOneButton.onclick = resetCurrent;
    resetAllButton.onclick = resetAll;
    loadPrompts(false);
  </script>
</body>
</html>
